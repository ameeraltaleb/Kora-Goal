name: Fetch Standings - Daily

on:
  schedule:
    # Runs daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  fetch-standings:
    runs-on: ubuntu-latest
    
    steps:
      - name: Fetch League Standings
        run: |
          response=$(curl -s -w "\n%{http_code}" ${{ secrets.DEPLOY_URL }}/api/cron/fetch-standings)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "Response: $body"
          echo "Status Code: $http_code"
          
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Successfully fetched standings"
          else
            echo "❌ Failed to fetch standings (HTTP $http_code)"
            exit 1
          fi
